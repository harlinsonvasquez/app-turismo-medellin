name: app_turismo
description: AppTurismo - Discover Medellín Your Way
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  go_router: ^13.2.0
  cached_network_image: ^3.3.1
  flutter_rating_bar: ^4.0.1
  smooth_page_indicator: ^1.1.0
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
