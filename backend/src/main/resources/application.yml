spring:
  application:
    name: turismo-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:turismo_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:Y2hhbmdlLW1lLXdpdGgtYS1sb25nLXJhbmRvbS1zZWNyZXQta2V5LWF0LWxlYXN0LTMyLWJ5dGVz}
    expiration-ms: ${JWT_EXPIRATION:86400000}

logging:
  level:
    org.springframework.security: INFO
